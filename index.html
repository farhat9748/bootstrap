<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registration Form</title>

    width:100%;

<body>

<div class="container">
    <h2>User Registration Form</h2>

    <form id="registrationForm">

        <div class="form-group">
            <label>Full Name</label>
            <input type="text"
                   id="name"
                   placeholder="Enter Full Name"
                   required>
        </div>

        <div class="form-group">
            <label>Mobile Number</label>
            <input type="text"
                   id="mobile"
                   placeholder="Enter 10 Digit Mobile Number"
                   maxlength="10"
                   required>
        </div>

        <div class="form-group">
            <label>Gmail Address</label>
            <input type="email"
                   id="email"
                   placeholder="example@gmail.com"
                   required>
        </div>

        <div class="form-group">
            <label>PAN Number</label>
            <input type="text"
                   id="pan"
                   placeholder="ABCDE1234F"
                   maxlength="10"
                   required>
        </div>

        <div class="form-group">
            <label>Date of Birth (DD/MM/YYYY)</label>
            <input type="text"
                   id="dob"
                   placeholder="DD/MM/YYYY"
                   maxlength="10"
                   required>
        </div>

        <button type="submit">Submit</button>

    </form>
</div>

<script>

// Name: Only letters and spaces
document.getElementById("name").addEventListener("input", function(){
    this.value = this.value.replace(/[^A-Za-z ]/g, "");
});

// Mobile: Only numbers
document.getElementById("mobile").addEventListener("input", function(){
    this.value = this.value.replace(/\D/g, "").slice(0,10);
});

// PAN: Uppercase automatically
document.getElementById("pan").addEventListener("input", function(){
    this.value = this.value.toUpperCase();
});

// DOB Auto Format DD/MM/YYYY
document.getElementById("dob").addEventListener("input", function () {

    let value = this.value.replace(/\D/g, '');

    if(value.length > 2 && value.length <= 4){
        value = value.slice(0,2) + '/' + value.slice(2);
    }
    else if(value.length > 4){
        value = value.slice(0,2) + '/' + value.slice(2,4) + '/' + value.slice(4,8);
    }

    this.value = value;
});

// Form Validation
document.getElementById("registrationForm").addEventListener("submit", function(e){

    let mobile = document.getElementById("mobile").value;
    let email = document.getElementById("email").value.trim();
    let pan = document.getElementById("pan").value.trim();
    let dob = document.getElementById("dob").value.trim();

    let panPattern = /^[A-Z]{5}[0-9]{4}[A-Z]{1}$/;
    let dobPattern = /^(0[1-9]|[12][0-9]|3[01])\/(0[1-9]|1[0-2])\/(19|20)\d{2}$/;
    let gmailPattern = /^[a-zA-Z0-9._%+-]+@gmail\.com$/;

    if(mobile.length !== 10){
        alert("Mobile Number must be exactly 10 digits.");
        e.preventDefault();
        return;
    }

    if(!gmailPattern.test(email)){
        alert("Only Gmail addresses are allowed.");
        e.preventDefault();
        return;
    }

    if(!panPattern.test(pan)){
        alert("Invalid PAN Number. Example: ABCDE1234F");
        e.preventDefault();
        return;
    }

    if(!dobPattern.test(dob)){
        alert("Date must be in DD/MM/YYYY format.");
        e.preventDefault();
        return;
    }

    alert("Form Submitted Successfully!");
});

</script>

</body>
</html>
